<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dental Pro - Login</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full">
    <h2 class="text-2xl font-bold text-center mb-4">🦷 Dental Pro</h2>
    {% if error %}<div class="bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-center">{{ error }}</div>{% endif %}
    <form method="post" class="space-y-4">
        <input type="text" name="username" class="w-full border p-3 rounded-xl" placeholder="Username" required>
        <input type="password" name="password" class="w-full border p-3 rounded-xl" placeholder="Password" required>
<label class="flex items-center gap-2 text-sm"><input type="checkbox" name="remember" checked> Remember me</label>
        <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded-xl font-bold">Sign In</button>
    </form>
    <p class="text-center text-sm mt-4 text-gray-500">New doctor? <a href="/register" class="text-teal-600 font-bold">Create Account</a></p>
</div></body></html>
