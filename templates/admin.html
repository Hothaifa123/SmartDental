<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-50 p-6"><div class="max-w-2xl mx-auto"><h1 class="text-2xl font-bold mb-4">👥 Manage Users</h1><div id="list" class="space-y-2 mb-6"></div><div class="bg-white rounded-2xl p-5 shadow"><h3 class="font-bold mb-3">Add User</h3><div class="grid grid-cols-2 gap-3"><input id="u-name" class="border rounded-xl p-2" placeholder="Username"><input id="u-pass" type="password" class="border rounded-xl p-2" placeholder="Password"></div><button class="mt-3 bg-teal-600 text-white px-4 py-2 rounded-xl font-bold" onclick="add()">Add</button></div><a href="/" class="block mt-4 text-teal-600">← Back</a></div><script>async function api(u,o){const r=await fetch(u,o);return r.json()}async function load(){let u=await api('/api/admin/users');document.getElementById('list').innerHTML=u.map(u=>`<div class="bg-white rounded-xl p-3 flex justify-between items-center shadow"><div><b>${u.username}</b> ${u.is_admin?'👑':''} <span class="text-xs ${u.is_active?'text-green-600':'text-red-600'}">${u.is_active?'Active':'Disabled'}</span></div><div class="flex gap-2"><button class="text-xs ${u.is_active?'bg-red-100 text-red-700':'bg-green-100 text-green-700'} px-2 py-1 rounded" onclick="toggle(${u.id},${!u.is_active})">${u.is_active?'Disable':'Enable'}</button><button class="text-xs bg-red-200 text-red-700 px-2 py-1 rounded" onclick="del(${u.id})">Del</button></div></div>`).join('')}async function add(){let n=document.getElementById('u-name').value,p=document.getElementById('u-pass').value;if(!n||!p)return;await api('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:n,password:p})});document.getElementById('u-name').value='';document.getElementById('u-pass').value='';load()}async function toggle(id,act){await api('/api/admin/users',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,is_active:act})});load()}async function del(id){if(confirm('Delete?')){await api('/api/admin/users?id='+id,{method:'DELETE'});load()}}load();</script></body></html>
