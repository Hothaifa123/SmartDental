<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dental Smart Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <meta name="theme-color" content="#0d9488">
    <style>
        :root{--teal:#0d9488;--bg:#f0fdfa;--red:#ef4444;--amber:#f59e0b}
        *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:#1a2e2b}
        .app{display:flex;min-height:100vh}
        .sidebar{width:260px;background:linear-gradient(180deg,#0f766e,#115e59);color:#fff;padding:20px 14px;position:fixed;left:0;top:0;bottom:0;z-index:40;overflow-y:auto;transition:transform 0.3s ease}
        .sidebar.hidden{transform:translateX(-100%)}
        .main{margin-left:260px;flex:1;padding:20px;transition:margin-left 0.3s ease}
        .main.full{margin-left:0}
        .toggle-btn{position:fixed;top:15px;left:15px;z-index:50;background:#0f766e;color:white;border:none;border-radius:12px;padding:10px;cursor:pointer;display:none}
        .nav-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;cursor:pointer;transition:.2s;margin:3px 0;color:#ccf0e9;font-size:14px;border:none;background:none;width:100%;text-align:left}
        .nav-item:hover,.nav-item.active{background:rgba(255,255,255,.15);color:#fff}
        .nav-item.danger{color:#fca5a5}
        .card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:14px}
        .input{border:2px solid #e2e8f0;border-radius:12px;padding:10px 12px;width:100%;outline:none;font-size:14px;background:#fff}
        .input:focus{border-color:var(--teal)}
        .btn{background:var(--teal);color:#fff;padding:10px 18px;border-radius:12px;font-weight:600;border:none;cursor:pointer;font-size:14px;width:100%}
        .btn:hover{opacity:0.9}.btn-red{background:var(--red)}.btn-amber{background:var(--amber)}
        .tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .tag-red{background:#fee2e2;color:#991b1b}.tag-amber{background:#fef3c7;color:#92400e}
        .rx-paper{background:#fff;padding:25px;border:1px solid #ddd;max-width:420px;margin:0 auto;box-shadow:0 8px 30px rgba(0,0,0,.08);font-size:13px;position:relative;overflow:hidden}
        .rx-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.04;font-size:120px;font-weight:900;pointer-events:none}
        .view{display:none}.view.active{display:block}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
        .chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:12px;border:1px solid #ddd;cursor:pointer;margin:3px}
        .chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}
        .drug-selected{background:#e0f2fe!important;border-color:#0d9488!important}
        .drug-warning{background:#fee2e2!important;border-color:#ef4444!important}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .main{margin-left:0!important}
            .toggle-btn{display:block}
        }
    </style>
</head>
<body>
<button class="toggle-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="mb-4 px-2 text-center">
            <img id="s-logo" src="" class="w-16 h-16 rounded-2xl mx-auto mb-2 object-cover" style="display:none">
            <h2 class="font-extrabold text-lg">🦷 Smart Dental</h2>
            <p class="text-teal-200 text-xs" id="s-clinic">Clinic</p>
        </div>
        <nav>
            <button class="nav-item active" data-v="rx" ><i data-lucide="zap"></i> Instant Rx</button>
            <button class="nav-item" data-v="patients" ><i data-lucide="users"></i> Patients</button>
            <button class="nav-item" data-v="ai" ><i data-lucide="sparkles"></i> AI Assistant</button>
            <button class="nav-item" data-v="library" ><i data-lucide="pill"></i> Drug Library</button>
            <button class="nav-item" data-v="ready" ><i data-lucide="clipboard-list"></i> Ready Rx</button>
            <button class="nav-item" data-v="emergency" ><i data-lucide="siren"></i> Emergencies</button>
            <button class="nav-item" data-v="settings" ><i data-lucide="settings"></i> Settings</button>
            {% if current_user.is_admin %}
            <button class="nav-item" data-v="admin-drugs" ><i data-lucide="shield"></i> Manage Drugs</button>
            <button class="nav-item" data-v="admin-users" ><i data-lucide="user-cog"></i> Manage Users</button>
            {% endif %}
            <a href="/logout" class="nav-item danger"><i data-lucide="log-out"></i> Logout</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-teal-700 text-xs text-teal-200">
            <p>Dr. Hothaifa Fouad Al-Hamdani</p>
            <p>📞 +967 770972786</p>
            <p>✉️ hothaifaalhamdani123@gmail.com</p>
        </div>
    </aside>
    <main class="main" id="main-content">
        <!-- كل الأقسام كما هي بدون تغيير (Instant Rx, Preview, Patients, AI, Library, Ready Rx, Emergencies, Settings, Admin panels) -->
        <!-- لتجنب التكرار، سأشير إلى أنها موجودة كما في آخر نسخة ناجحة -->
        <!-- يجب نسخ محتوى الأقسام من الإصدار السابق -->
        <!-- سيتم تضمين الأقسام المهمة فقط هنا -->
        <section id="settings" class="view">
            <h2 class="text-xl font-bold mb-3">⚙️ Settings</h2>
            <div class="card max-w-md">
                <h3 class="font-bold mb-2">🖼 Logo</h3><input type="file" id="s-logo-file" accept="image/*" class="input mb-2" onchange="uploadLogo()">
                <img id="s-logo-preview" src="" class="w-20 h-20 rounded-2xl object-cover mb-2" style="display:none">
                <h3 class="font-bold mb-2">🌊 Watermark</h3><input type="file" id="s-watermark-file" accept="image/*" class="input mb-2" onchange="uploadWatermark()">
                <img id="s-watermark-preview" src="" class="w-20 h-20 rounded-2xl object-cover mb-2" style="display:none">
                <input id="s-name" class="input mb-2" placeholder="Doctor Name">
                <input id="s-phone" class="input mb-2" placeholder="Phone">
                <input id="s-specialty" class="input mb-2" placeholder="Specialty">
                <input id="s-clinic" class="input mb-2" placeholder="Clinic Name">
                <input id="s-address" class="input mb-2" placeholder="Clinic Address">
                <h3 class="font-bold mt-4 mb-2">🔐 Change Password</h3>
                <input id="s-new-pass" type="password" class="input mb-2" placeholder="New password">
                <button class="btn" onclick="saveSettings()">💾 Save</button>
            </div>
        </section>
        <!-- باقي الأقسام تكرر كما في الملف الكامل السابق -->
    </main>
</div>
<script>
// وظائف القائمة الجانبية
function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar(){
    if(window.innerWidth <= 768){
        document.getElementById('sidebar').classList.remove('open');
    }
}
// إصلاح دالة الحفظ
async function saveSettings(){
    let data = {
        name: document.getElementById('s-name').value,
        phone: document.getElementById('s-phone').value,
        specialty: document.getElementById('s-specialty').value,
        clinic: document.getElementById('s-clinic').value,
        address: document.getElementById('s-address').value
    };
    let pass = document.getElementById('s-new-pass').value;
    if(pass) data.password = pass;
    let res = await fetch('/api/settings', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    if(res.ok){
        alert('Settings saved successfully!');
        load(); // إعادة تحميل الإعدادات
    } else {
        alert('Failed to save settings.');
    }
}
// ... باقي الدوال (load, uploadLogo, uploadWatermark, ...) تبقى كما هي من الإصدار السابق
// يجب دمجها كاملة من الملف السابق
</script>
</body>
</html>
