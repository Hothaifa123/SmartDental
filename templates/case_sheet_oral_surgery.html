<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Sheet of Oral Surgery - Smart Dental</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--ink:#1f2933;--muted:#5b6570;--line:#8d969b;--paper:#fff;--accent:#0f5e6b;--accent-dark:#0a4650}
    *{box-sizing:border-box}body{margin:0;font-family:'Source Serif 4',serif;color:var(--ink);background:#e8e6e0}
    .app-shell{width:100%;min-height:100vh;padding:22px;background:linear-gradient(180deg,#eeece6 0%,#e1dfd8 100%)}
    .toolbar{width:min(1120px,100%);margin:0 auto 18px;background:rgba(255,255,255,.88);border:1px solid rgba(31,41,51,.08);box-shadow:0 8px 30px rgba(31,41,51,.08);border-radius:18px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;backdrop-filter:blur(8px)}
    .toolbar-title{display:flex;align-items:center;gap:12px}
    .toolbar-mark{width:38px;height:38px;border-radius:50%;background:linear-gradient(145deg,var(--accent),#1a7b89);display:grid;place-items:center;color:#fff}
    .toolbar-actions{display:flex;gap:10px;flex-wrap:wrap}
    .action-btn{border:none;border-radius:999px;padding:10px 16px;font-family:'Work Sans',sans-serif;font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:.2s ease}
    .primary-btn{background:var(--accent);color:#fff}
    .primary-btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
    .secondary-btn{background:#edf0f1;color:#314047}
    .secondary-btn:hover{background:#e1e6e8;transform:translateY(-1px)}
    .pages{width:min(1120px,100%);margin:0 auto;display:flex;flex-direction:column;gap:28px;align-items:center}
    .sheet{width:794px;min-height:1123px;background:#fff;box-shadow:0 18px 42px rgba(25,31,35,.18);padding:40px 48px 36px;position:relative;overflow:hidden}
    .page-header{display:grid;grid-template-columns:1fr 108px 1fr;gap:14px;align-items:start;margin-bottom:10px}
    .small-head{font-size:14px;font-weight:600;line-height:1.5}
    .logo-wrap{display:flex;justify-content:center;align-items:center;height:84px}
    .logo-frame{width:82px;height:82px;border-radius:16px;overflow:hidden;border:1px solid #c9d1d6;display:flex;align-items:center;justify-content:center;background:#f9faf9}
    .logo-frame img{width:100%;height:100%;object-fit:contain}
    .status-box{border:1px solid #7c858c;padding:6px 7px;font-size:12px;line-height:1.7;min-height:74px}
    .doc-title{text-align:center;margin:4px 0 10px;font-weight:700;font-size:18px;text-decoration:underline;text-underline-offset:2px}
    .section{margin-top:8px;font-size:13px}
    .section-title{font-weight:700;margin-bottom:3px;line-height:1.3}
    .section-title .subnote{font-weight:600;margin-left:8px;font-size:12px}
    .line-row{display:flex;align-items:flex-end;gap:10px;min-height:20px;margin:1px 0;width:100%}
    .field{display:flex;align-items:flex-end;gap:3px;min-width:0}
    .field label{font-weight:600;font-size:12px;white-space:nowrap;flex:none}
    .field input,.field select{border:none;border-bottom:1px dotted #858d92;outline:none;height:20px;font:13px 'Source Serif 4',serif;padding:0 2px 1px;background:transparent;width:100%;min-width:0}
    .name-field{flex:2.2}.gender-field{flex:.85}.age-field{flex:.55}.date-field{flex:.9}.address-field{flex:1.7}.occupation-field{flex:1}.tel-field{flex:.8}
    .textarea-lines{width:100%;display:block;border:none;outline:none;resize:none;font:13px 'Source Serif 4',serif;line-height:1.5;min-height:46px;padding:0 2px;background:repeating-linear-gradient(to bottom,transparent 0,transparent 20px,#aab0b4 21px,transparent 22px)}
    .checkbox-line{display:flex;align-items:center;gap:6px;min-height:19px;margin:2px 0;width:100%}
    .medical-state{width:14px;height:14px;border:1px solid #5c666d;display:flex;align-items:center;justify-content:center;font-family:'Work Sans',sans-serif;font-size:12px;line-height:1;cursor:pointer;flex:none;user-select:none;background:#fff}
    .medical-state.checked{color:#107653;font-weight:700}
    .medical-state.crossed{color:#b63b35;font-weight:700}
    .checkbox-line span.label{font-size:12px;flex:none;white-space:nowrap}
    .checkbox-fill{flex:1;min-width:0;border-bottom:1px dotted #90979b;height:16px;position:relative}
    .medical-note{position:absolute;left:2px;right:0;bottom:0;height:16px;border:none;outline:none;font:12px 'Source Serif 4',serif;line-height:1.5;background:transparent;width:100%;min-width:0}
    .oral-condition-note{border:none;border-bottom:1px dotted #90979b;outline:none;width:100%;font:12px 'Source Serif 4',serif;line-height:1.5;background:transparent;padding:0 2px 1px;height:16px}
    .exam-state{width:14px;height:14px;border:1px solid #5c666d;display:flex;align-items:center;justify-content:center;font-family:'Work Sans',sans-serif;font-size:12px;line-height:1;cursor:pointer;flex:none;user-select:none;background:#fff;transition:all .15s ease}
    .exam-state.normal{background:#e3f2fd;border-color:#1c67a5;color:#1c67a5;font-weight:700}
    .exam-state.middle{background:#f3e5f5;border-color:#6b46c1;color:#6b46c1;font-weight:700}
    .exam-state.abnormal{background:#ffebee;border-color:#c7352e;color:#c7352e;font-weight:700}
    .exam-note{position:absolute;left:2px;right:0;bottom:0;height:16px;border:none;outline:none;font:12px 'Source Serif 4',serif;line-height:1.5;background:transparent;width:100%;min-width:0}
    .investigations-dropdown,.diagnosis-dropdown{background:#fff;border:1px solid #8b9498;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:10;width:100%;max-height:180px;overflow-y:auto}
    .investigation-option,.diagnosis-option{padding:8px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #e0e0e0;font-family:'Source Serif 4',serif;color:#1f2933;transition:background .1s ease}
    .investigation-option:last-child,.diagnosis-option:last-child{border-bottom:none}
    .investigation-option:hover,.diagnosis-option:hover{background:#f0f4f8}
    .tooth-chart-wrap{margin-top:5px;display:flex;align-items:flex-start;gap:8px}
    .tooth-legend{width:110px;font-size:11px;line-height:1.65}
    .tooth-grid{flex:1;border:1px solid #8f989e;max-width:250px}
    .tooth-row{display:grid;grid-template-columns:repeat(16,1fr);min-height:18px}
    .tooth-row+.tooth-row{border-top:1px solid #8f989e}
    .tooth-cell{border-right:1px solid #8f989e;display:flex;align-items:center;justify-content:center;font-size:10px;min-width:0;position:relative}
    .tooth-cell:last-child{border-right:none}
    .mark-cell{cursor:pointer;font-family:'Work Sans',sans-serif;font-size:14px;font-weight:700}
    .mark-cell:hover{background:#f2f7f8}
    .palette{position:fixed;z-index:50;background:#fff;border:1px solid #cbd5da;box-shadow:0 10px 24px rgba(0,0,0,.14);border-radius:10px;padding:7px;display:none;gap:4px}
    .palette button{border:1px solid #d2d9dc;background:#fff;border-radius:6px;width:28px;height:26px;cursor:pointer;font-family:'Work Sans',sans-serif;font-weight:700;font-size:15px}
    .palette button:hover{background:#f4f7f8}
    .red{color:#c7352e}.blue{color:#1c67a5}
    .treatment-grid{display:grid;grid-template-columns:1.05fr 1.25fr;gap:14px;margin-top:8px;align-items:start}
    .plan-list{display:flex;flex-direction:column;gap:4px}
    .plan-row{display:grid;grid-template-columns:16px 1fr;align-items:end;gap:4px;font-size:12px}
    .plan-row input,.signature-line input{border:none;border-bottom:1px dotted #8b9498;outline:none;width:100%;font:12px 'Source Serif 4',serif;line-height:1.5;background:transparent}
    .signature-block{margin-top:10px;font-size:11px;line-height:1.8}
    .signature-line{display:flex;gap:5px;align-items:flex-end;margin-bottom:2px}
    .signature-line span{white-space:nowrap}
    .score-table{border-collapse:collapse;width:100%;font-size:11px}
    .score-table td,.score-table th{border:1px solid #90989d;padding:3px 5px;line-height:1.15}
    .score-table th{font-weight:700;text-align:center;background:#fafafa}
    .score-table td:last-child{text-align:center;width:55px;font-weight:600}
    .small-note-box{width:126px;border:1px solid #90989d;padding:5px 6px;font-size:10.5px;line-height:1.65;margin-top:10px}
    @media(max-width:900px){.app-shell{padding:14px}.pages{overflow-x:auto;align-items:flex-start;padding-bottom:8px}.toolbar{align-items:flex-start;flex-direction:column}}
    @media print{body{background:#fff}.app-shell{padding:0;background:#fff}.toolbar{display:none}.pages{width:100%;gap:0;display:block}.sheet{width:210mm;min-height:297mm;box-shadow:none;page-break-after:always;margin:0;padding:11mm 12.5mm 10mm}.sheet:last-child{page-break-after:auto}.sheet:before{display:none}.palette{display:none!important}}
  </style>
</head>
<body>
<div class="app-shell">
 <header class="toolbar">
  <div class="toolbar-title">
   <div class="toolbar-mark"><i data-lucide="stethoscope"></i></div>
   <div><h1 style="font-family:'Work Sans',sans-serif;font-size:19px;font-weight:700;margin:0;">Oral Surgery Management System</h1><p style="font-family:'Work Sans',sans-serif;font-size:14px;margin:2px 0 0;color:#66727a;">Clinical Record Dashboard</p></div>
  </div>
  <div class="toolbar-actions">
   <label for="logoInput" class="action-btn secondary-btn" style="cursor:pointer;"><i data-lucide="image-up"></i><span>Upload Logo</span></label>

   <button id="saveDbBtn" class="action-btn secondary-btn"><i data-lucide="database"></i><span>Save to DB</span></button>

   <button id="clearBtn" class="action-btn secondary-btn"><i data-lucide="rotate-ccw"></i><span>Clear</span></button>
   <button id="printBtn" class="action-btn primary-btn"><i data-lucide="printer"></i><span>Print</span></button>

    <div class="line-row">
     <div class="field name-field"><label for="patientSelect">Name:</label><select id="patientSelect" style="border:none;border-bottom:1px dotted #858d92;outline:none;height:20px;font:13px 'Source Serif 4',serif;padding:0 2px 1px;background:transparent;width:100%;min-width:0;"><option value="">Select Patient...</option></select></div>
     <div class="field gender-field"><label for="gender">Gender:</label><input id="gender"></div>
     <div class="field age-field"><label for="age">Age:</label><input id="age"></div>

</div>
